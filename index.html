<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portafolio de Alpakino — desarrollador full stack. Proyectos, habilidades y contacto."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Alpakino | Portafolio</title>
    <script>
      (function () {
        var storedTheme = localStorage.getItem('theme')
        var storedPalette = localStorage.getItem('palette')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        var theme =
          storedTheme === 'light' || storedTheme === 'dark'
            ? storedTheme
            : prefersDark
              ? 'dark'
              : 'light'
        var palettes = ['violet', 'ocean', 'emerald', 'coral', 'amber']
        var palette =
          palettes.indexOf(storedPalette) !== -1 ? storedPalette : 'violet'
        var root = document.documentElement
        root.setAttribute('data-theme', theme)
        root.setAttribute('data-palette', palette)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
